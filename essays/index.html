<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essays - Branavan Selvasingham</title>
    <meta name="description" content="Longer-form essays by Branavan Selvasingham on AI, systems, robotics, simulation, and related questions.">
    <link rel="icon" href="../assets/wave.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sora', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        display: ['"Instrument Serif"', 'Georgia', 'serif']
                    }
                }
            }
        };
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            const initialDark = savedTheme ? savedTheme === 'dark' : prefersDark;
            document.body.classList.toggle('dark-mode', initialDark);
            document.documentElement.classList.toggle('dark', initialDark);

            const toggleButton = document.querySelector('#dark-mode-toggle');
            if (toggleButton) {
                toggleButton.addEventListener('click', function() {
                    const isDark = document.body.classList.toggle('dark-mode');
                    document.documentElement.classList.toggle('dark', isDark);
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                });
            }

            if (!savedTheme && window.matchMedia) {
                const mq = window.matchMedia('(prefers-color-scheme: dark)');
                mq.addEventListener('change', (e) => {
                    document.body.classList.toggle('dark-mode', e.matches);
                    document.documentElement.classList.toggle('dark', e.matches);
                });
            }
        });
    </script>
</head>
<body>
    <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="Toggle theme"></button>

    <main class="relative overflow-hidden px-4 pb-20 pt-8 sm:px-6 lg:px-10">
        <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 top-0 -z-10 h-[520px] bg-[radial-gradient(circle_at_14%_0%,rgba(14,116,144,0.15),transparent_44%),radial-gradient(circle_at_86%_0%,rgba(59,130,246,0.08),transparent_40%)] dark:bg-[radial-gradient(circle_at_14%_0%,rgba(59,130,246,0.15),transparent_44%),radial-gradient(circle_at_86%_0%,rgba(14,165,233,0.1),transparent_40%)]"></div>

        <nav class="essay-nav">
            <a href="../index.html">Home</a>
            <span>/</span>
            <span>Essays</span>
        </nav>

        <section class="essay-hero curated-hero rounded-[2rem] border border-slate-200/90 bg-white/90 px-7 py-7 shadow-[0_22px_72px_-36px_rgba(2,6,23,0.42)] backdrop-blur-xl sm:px-10 sm:py-9 dark:border-slate-700/70 dark:bg-slate-900/76">
            <h1 class="font-display text-5xl leading-[0.92] tracking-tight text-slate-950 sm:text-6xl dark:text-white">Essays</h1>
            <p class="mt-5 max-w-2xl text-lg leading-[1.6] text-slate-700 dark:text-slate-200">Longer-form writing that belongs on its own page.</p>
        </section>

        <section class="mx-auto mt-10 w-full max-w-5xl">
            <div class="grid gap-4">
                <article class="essay-card essay-card-with-image">
                    <div class="essay-card-media">
                        <img src="../assets/media/essays/gravity-magnetism-and-love.jpg" alt="A cosmic visualization of gravity, magnetism, and connected information systems." loading="lazy">
                    </div>
                    <div class="essay-card-body">
                        <p class="essay-kicker">Essay</p>
                        <h2 class="essay-card-title">Gravity, Magnetism, and Love</h2>
                        <p class="essay-card-summary">On attraction between information systems.</p>
                        <a href="gravity-magnetism-and-love.html" class="curated-link mt-5 inline-flex text-sm font-semibold">Read essay</a>
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
